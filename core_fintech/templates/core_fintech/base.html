<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0284c7">
    <title>{% block title %}SME Bookkeeper{% endblock %}</title>

    <!-- Tailwind CDN — config defined once here for all pages -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#e0f2fe',
                            DEFAULT: '#0284c7',
                            dark: '#0369a1',
                        },
                        money: {
                            DEFAULT: '#059669',
                        },
                        expense: {
                            DEFAULT: '#e11d48',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'core_fintech/css/main.css' %}">

    <!-- Extra head content per page (e.g. page-specific styles) -->
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-gray-100 text-gray-900 font-sans antialiased min-h-screen flex justify-center">

    <!-- All pages share the mobile container -->
    <main class="w-full max-w-md bg-white min-h-screen shadow-xl relative overflow-x-hidden flex flex-col">

        <!-- Django messages (success/error toasts) -->
        {% if messages %}
        <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-full max-w-sm px-4 space-y-2">
            {% for message in messages %}
            <div
                class="{% if message.tags == 'error' %}bg-red-500{% else %}bg-emerald-500{% endif %} text-white text-sm font-medium px-4 py-3 rounded-2xl shadow-lg text-center">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}

    </main>

</body>

</html>
